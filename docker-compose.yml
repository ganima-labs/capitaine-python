version: "3.9"
services:
  api:
    build:
      context: .
      dockerfile: app/Dockerfile
    ports:
      - "8080:8080"
    environment:
      # Configuration sécurisée
      - ENVIRONMENT=development
      - EXECUTOR_URL=http://piston:2000/api/v2/execute
      - USE_SECURE_EXECUTOR=true
      - MAX_CODE_LENGTH=5000
      - MAX_EXECUTION_TIME=10
      - MAX_MEMORY_USAGE=134217728
      - DB_PATH=/data/progress.db
      - LOG_LEVEL=INFO
      - ENABLE_REQUEST_LOGGING=true
      - ENABLE_SECURITY_LOGGING=true
      - DEBUG_MODE=false
      # CORS
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8080
      - ALLOWED_METHODS=GET,POST
    volumes:
      - progress:/data
    # Dépendance à un service local Piston
    depends_on:
      - piston
    # Sécurité du conteneur
    security_opt:
      - no-new-privileges:true
    # Ressources limitées
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    # Health check simple
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - capitaine-python-net

  # Service Piston pour l'exécution du code Python (avec restrictions)
  piston:
    image: utkashx/engineer-man-piston:latest
    ports:
      - "2000:2000"
    volumes:
      - piston_data:/piston
    # Sécurité du conteneur
    security_opt:
      - no-new-privileges:true
    # Ressources limitées pour l'exécution de code
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    # Health check simple
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - capitaine-python-net

  # Réseaux
networks:
  capitaine-python-net:
    driver: bridge

# Volumes
volumes:
  progress:
    driver: local
  piston_data:
    driver: local
