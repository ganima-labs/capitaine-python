version: "3.9"
services:
  api:
    build: ./app
    ports:
      - "8080:8080"
    environment:
      # Configuration sécurisée
      - ENVIRONMENT=development
      - EXECUTOR_URL=http://piston:2000/api/v2/execute
      - USE_SECURE_EXECUTOR=true
      - MAX_CODE_LENGTH=5000
      - MAX_EXECUTION_TIME=10
      - MAX_MEMORY_USAGE=134217728
      - DB_PATH=/data/progress.db
      - LOG_LEVEL=INFO
      - ENABLE_REQUEST_LOGGING=true
      - ENABLE_SECURITY_LOGGING=true
      - DEBUG_MODE=false
      # CORS
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8080
      - ALLOWED_METHODS=GET,POST
      # Monitoring
      - METRICS_ENABLED=true
      - PROMETHEUS_ENABLED=true
    volumes:
      - progress:/data
      - ./monitoring/health-checks:/health-checks:ro
    # Dépendance à un service local Piston
    depends_on:
      piston:
        condition: service_healthy
      prometheus:
        condition: service_started
      grafana:
        condition: service_started
    # Sécurité du conteneur
    security_opt:
      - no-new-privileges:true
    read_only: true  # Système de fichiers en lecture seule
    tmpfs:
      - /tmp:noexec,nosuid,size=100m  # tmpfs sécurisé
    # Ressources limitées
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    # Health check amélioré
    healthcheck:
      test: ["CMD", "python3", "/health-checks/api-health.py"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    labels:
      - "monitoring.capitaine-python.enabled=true"
      - "monitoring.capitaine-python.service=api"
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=PathPrefix(`/api`)"
      - "traefik.http.services.api.loadbalancer.server.port=8080"
    networks:
      - capitaine-python-net
      - monitoring-net

  # Service Piston pour l'exécution du code Python (avec restrictions)
  piston:
    image: utkashx/engineer-man-piston:latest
    ports:
      - "2000:2000"
    volumes:
      - piston_data:/piston
      - ./monitoring/health-checks:/health-checks:ro
    # Sécurité du conteneur
    security_opt:
      - no-new-privileges:true
    # Ressources limitées pour l'exécution de code
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    # Health check amélioré
    healthcheck:
      test: ["CMD", "python3", "/health-checks/piston-health.py"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    labels:
      - "monitoring.capitaine-python.enabled=true"
      - "monitoring.capitaine-python.service=piston"
    networks:
      - capitaine-python-net
      - monitoring-net

  # Prometheus pour la collecte de métriques
  prometheus:
    image: prom/prometheus:v2.47.0
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command: ['prometheus', '--config.file=/etc/prometheus/prometheus.yml', '--storage.tsdb.path=/prometheus', '--web.console.libraries=/etc/prometheus/console_libraries', '--web.console.templates=/etc/prometheus/consoles', '--storage.tsdb.retention.time=30d', '--web.enable-lifecycle']
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    labels:
      - "monitoring.capitaine-python.enabled=true"
      - "monitoring.capitaine-python.service=prometheus"
    networks:
      - monitoring-net

  # Grafana pour la visualisation
  grafana:
    image: grafana/grafana:10.1.0
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=smtp.gmail.com:587
      - GF_SMTP_USER=votre-email@gmail.com
      - GF_SMTP_PASSWORD=votre-mot-de-passe
      - GF_SMTP_FROM_ADDRESS=votre-email@gmail.com
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    labels:
      - "monitoring.capitaine-python.enabled=true"
      - "monitoring.capitaine-python.service=grafana"
    networks:
      - monitoring-net

  # Alertmanager pour la gestion des alertes
  alertmanager:
    image: prom/alertmanager:v0.26.0
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
      - '--web.route-prefix=/'
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    labels:
      - "monitoring.capitaine-python.enabled=true"
      - "monitoring.capitaine-python.service=alertmanager"
    networks:
      - monitoring-net

  # Node Exporter pour métriques système
  node-exporter:
    image: prom/node-exporter:v1.6.1
    ports:
      - "9100:9100"
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    labels:
      - "monitoring.capitaine-python.enabled=true"
      - "monitoring.capitaine-python.service=node-exporter"
    networks:
      - monitoring-net

  # Cadvisor pour monitoring des conteneurs
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    labels:
      - "monitoring.capitaine-python.enabled=true"
      - "monitoring.capitaine-python.service=cadvisor"
    networks:
      - monitoring-net

  # Loki pour logs centralisés
  loki:
    image: grafana/loki:2.9.0
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./monitoring/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    labels:
      - "monitoring.capitaine-python.enabled=true"
      - "monitoring.capitaine-python.service=loki"
    networks:
      - monitoring-net

  # Promtail pour collecter les logs
  promtail:
    image: grafana/promtail:2.9.0
    volumes:
      - ./monitoring/promtail/promtail-config.yaml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    restart: unless-stopped
    labels:
      - "monitoring.capitaine-python.enabled=true"
      - "monitoring.capitaine-python.service=promtail"
    networks:
      - monitoring-net

  # Monitoring Watchdog
  monitoring-watchdog:
    build:
      context: ./monitoring/watchdog
      dockerfile: Dockerfile
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./monitoring/watchdog/config:/app/config:ro
      - ./monitoring/scripts:/scripts:ro
    environment:
      - WATCHDOG_INTERVAL=30
      - ALERT_WEBHOOK_URL=http://alertmanager:9093/api/v1/alerts
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - EMAIL_TO=${ADMIN_EMAIL}
    depends_on:
      - prometheus
      - alertmanager
    restart: unless-stopped
    labels:
      - "monitoring.capitaine-python.enabled=true"
      - "monitoring.capitaine-python.service=watchdog"
    networks:
      - monitoring-net

  # Reverse Proxy Nginx
  nginx:
    image: nginx:1.24-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./monitoring/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./monitoring/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - grafana
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    labels:
      - "monitoring.capitaine-python.enabled=true"
      - "monitoring.capitaine-python.service=nginx"
    networks:
      - capitaine-python-net
      - monitoring-net

# Réseaux
networks:
  capitaine-python-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
  monitoring-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.0.0/16

# Volumes
volumes:
  progress:
    driver: local
  piston_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  alertmanager_data:
    driver: local
  loki_data:
    driver: local
