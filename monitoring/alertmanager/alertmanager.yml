global:
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'alerts@capitaine-python.com'
  smtp_auth_username: 'votre-email@gmail.com'
  smtp_auth_password: 'votre-mot-de-passe-app'
  slack_api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
  resolve_timeout: 5m

# Templates pour les notifications
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Routes pour les alertes
route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'default'
  routes:
    # Alertes critiques
    - match:
        severity: critical
      group_wait: 5s
      repeat_interval: 5m
      receiver: 'critical-alerts'
      routes:
        - match:
            alertname: 'ServiceDown'
          receiver: 'service-down-alerts'
        - match:
            alertname: 'DiskSpaceLow'
          receiver: 'disk-space-alerts'

    # Alertes de sécurité
    - match:
        severity: critical
      group_wait: 0s
      repeat_interval: 5m
      receiver: 'security-alerts'
      continue: true

    # Alertes warnings
    - match:
        severity: warning
      receiver: 'warning-alerts'
      repeat_interval: 30m

    # Alertes info
    - match:
        severity: info
      receiver: 'info-alerts'
      repeat_interval: 2h

    # Maintenances (suppression des alertes non critiques)
    - match:
        severity: 'info|warning'
      active_time_intervals:
        - business-hours
      receiver: 'null'

# Time periods
time_intervals:
  - name: business-hours
    time_intervals:
      - times:
          - start_time: '09:00'
            end_time: '18:00'
        weekdays: ['monday:friday']

# Receivers
receivers:
  - name: 'default'
    email_configs:
      - to: 'admin@capitaine-python.com'
        subject: '[Capitaine Python] {{ .GroupLabels.alertname }}'
        body: |
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Labels: {{ range .Labels.SortedPairs }}{{ .Name }}={{ .Value }} {{ end }}
          {{ end }}
    slack_configs:
      - channel: '#monitoring'
        title: 'Capitaine Python Alert'
        text: |
          {{ range .Alerts }}
          *Alert*: {{ .Annotations.summary }}
          *Description*: {{ .Annotations.description }}
          {{ end }}

  - name: 'critical-alerts'
    email_configs:
      - to: 'admin@capitaine-python.com,devops@capitaine-python.com'
        subject: '[CRITICAL] Capitaine Python - {{ .GroupLabels.alertname }}'
        body: |
          🚨 ALERT CRITICAL 🚨

          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Severity: {{ .Labels.severity }}
          Instance: {{ .Labels.instance }}
          Time: {{ .StartsAt }}

          {{ end }}

          Action required immediately!
    slack_configs:
      - channel: '#alerts-critical'
        title: '🚨 CRITICAL ALERT 🚨'
        color: 'danger'
        text: |
          {{ range .Alerts }}
          *Alert*: {{ .Annotations.summary }}
          *Description*: {{ .Annotations.description }}
          *Instance*: {{ .Labels.instance }}
          {{ end }}
        send_resolved: true
    webhook_configs:
      - url: 'http://monitoring-watchdog:8082/webhook/alert'
        send_resolved: true

  - name: 'service-down-alerts'
    webhook_configs:
      - url: 'http://monitoring-watchdog:8082/webhook/service-down'
        send_resolved: true
    telegram_configs:
      - bot_token: 'YOUR_TELEGRAM_BOT_TOKEN'
        chat_id: YOUR_CHAT_ID
        message: |
          🚨 *SERVICE DOWN* 🚨

          {{ range .Alerts }}
          *Service*: {{ .Labels.job }}
          *Instance*: {{ .Labels.instance }}
          *Time*: {{ .StartsAt }}
          {{ end }}

          Immediate action required!
        parse_mode: 'Markdown'
        send_resolved: true

  - name: 'disk-space-alerts'
    webhook_configs:
      - url: 'http://monitoring-watchdog:8082/webhook/disk-space'
        send_resolved: true
    email_configs:
      - to: 'admin@capitaine-python.com,sysadmin@capitaine-python.com'
        subject: '[DISK SPACE] Critical - {{ .GroupLabels.alertname }}'
        body: |
          💾 DISK SPACE CRITICAL 💾

          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Instance: {{ .Labels.instance }}
          Mountpoint: {{ .Labels.mountpoint }}
          Available: {{ .Labels.available }}
          {{ end }}

          Please cleanup disk space immediately!

  - name: 'security-alerts'
    email_configs:
      - to: 'security@capitaine-python.com,admin@capitaine-python.com'
        subject: '[SECURITY] {{ .GroupLabels.alertname }}'
        body: |
          🔒 SECURITY ALERT 🔒

          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Severity: {{ .Labels.severity }}
          Instance: {{ .Labels.instance }}
          Time: {{ .StartsAt }}

          {{ end }}

          Please investigate immediately!
    slack_configs:
      - channel: '#security-alerts'
        title: '🔒 SECURITY ALERT 🔒'
        color: 'warning'
        text: |
          {{ range .Alerts }}
          *Alert*: {{ .Annotations.summary }}
          *Description*: {{ .Annotations.description }}
          *Instance*: {{ .Labels.instance }}
          {{ end }}
        send_resolved: true
    webhook_configs:
      - url: 'http://monitoring-watchdog:8082/webhook/security'
        send_resolved: true

  - name: 'warning-alerts'
    email_configs:
      - to: 'admin@capitaine-python.com'
        subject: '[WARNING] Capitaine Python - {{ .GroupLabels.alertname }}'
        body: |
          ⚠️ WARNING ALERT ⚠️

          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          {{ end }}
    slack_configs:
      - channel: '#monitoring'
        title: '⚠️ Warning Alert'
        color: 'warning'
        text: |
          {{ range .Alerts }}
          *Alert*: {{ .Annotations.summary }}
          {{ end }}
        send_resolved: true

  - name: 'info-alerts'
    slack_configs:
      - channel: '#monitoring-info'
        title: 'ℹ️ Info Alert'
        color: 'good'
        text: |
          {{ range .Alerts }}
          *Alert*: {{ .Annotations.summary }}
          {{ end }}
        send_resolved: true

  - name: 'null'
    # Supprime les alertes (utilisé pour le silence pendant les heures de bureau)

# Inhibition rules
inhibit_rules:
  # Inhiber les warnings si un critique est actif pour le même service
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']

  # Inhiber les alerts info si un warning est actif
  - source_match:
      severity: 'warning'
    target_match:
      severity: 'info'
    equal: ['alertname', 'instance']

  # Inhiber les alerts de service down si le host est down
  - source_match:
      alertname: 'HostDown'
    target_match:
      alertname: 'ServiceDown'
    equal: ['instance']