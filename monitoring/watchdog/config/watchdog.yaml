# Configuration du Monitoring Watchdog

# Services à surveiller
services:
  - api
  - piston
  - prometheus
  - grafana
  - alertmanager
  - nginx
  - loki
  - promtail

# Paramètres de surveillance
watchdog:
  interval_seconds: 30
  health_check_timeout: 10
  max_restart_attempts: 3
  restart_cooldown_seconds: 300
  alert_cooldown_seconds: 3600

# Seuils d'alerte
thresholds:
  cpu_warning: 70
  cpu_critical: 90
  memory_warning: 80
  memory_critical: 95
  disk_warning: 20
  disk_critical: 10

# Configuration des alertes
alerts:
  telegram:
    enabled: true
    bot_token: "${TELEGRAM_BOT_TOKEN}"
    chat_id: "${TELEGRAM_CHAT_ID}"

  email:
    enabled: true
    smtp_server: "smtp.gmail.com:587"
    from: "alerts@capitaine-python.com"
    to: "${ADMIN_EMAIL}"
    username: "${EMAIL_USERNAME}"
    password: "${EMAIL_PASSWORD}"

  slack:
    enabled: false
    webhook_url: "${SLACK_WEBHOOK_URL}"
    channel: "#monitoring"

# Services critiques (tentative de redémarrage automatique)
critical_services:
  - api
  - piston

# Configuration du logging
logging:
  level: INFO
  file: "/app/logs/watchdog.log"
  max_size_mb: 100
  backup_count: 5