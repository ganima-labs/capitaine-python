global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'capitaine-python'
    environment: 'development'

rule_files:
  - "rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  # Prometheus lui-même
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 30s
    metrics_path: /metrics

  # API Capitaine Python
  - job_name: 'capitaine-python-api'
    static_configs:
      - targets: ['api:8080']
    scrape_interval: 15s
    metrics_path: /metrics
    scrape_timeout: 10s
    basic_auth:
      username: 'prometheus'
      password: 'prometheus123'
    params:
      format: ['prometheus']

  # Exporter Node pour métriques système
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 30s
    metrics_path: /metrics

  # cAdvisor pour métriques des conteneurs
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 30s
    metrics_path: /metrics
    honor_labels: true

  # Alertmanager
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
    scrape_interval: 30s
    metrics_path: /metrics

  # Grafana
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
    scrape_interval: 30s
    metrics_path: /metrics
    basic_auth:
      username: 'admin'
      password: 'admin123'

  # Docker Engine Metrics
  - job_name: 'docker'
    static_configs:
      - targets: ['docker-proxy:9323']
    scrape_interval: 30s

  # Monitoring Watchdog
  - job_name: 'monitoring-watchdog'
    static_configs:
      - targets: ['monitoring-watchdog:8082']
    scrape_interval: 15s
    metrics_path: /metrics

  # Health Checks personnalisés
  - job_name: 'health-checks'
    static_configs:
      - targets: ['api:8080', 'piston:2000']
    scrape_interval: 30s
    metrics_path: /health/metrics
    scheme: http

# Configuration du stockage
storage:
  tsdb:
    path: /prometheus
    retention.time: 30d
    retention.size: 10GB