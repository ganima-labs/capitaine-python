groups:
  - name: capitaine-python-alerts
    rules:
      # Alertes pour les services down
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} est down"
          description: "Le service {{ $labels.job }} ({{ $labels.instance }}) ne répond plus depuis plus d'une minute."

      # Alertes pour l'API
      - alert: APIHighLatency
        expr: http_request_duration_seconds{quantile="0.95"} > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Latence élevée de l'API"
          description: "Le 95ème percentile des temps de réponse de l'API est de {{ $value }}s."

      - alert: APIErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Taux d'erreurs élevé de l'API"
          description: "Le taux d'erreurs 5xx est de {{ $value | humanizePercentage }}."

      # Alertes pour les conteneurs
      - alert: ContainerHighMemoryUsage
        expr: (container_memory_usage_bytes / container_spec_memory_limit_bytes) * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Utilisation mémoire élevée du conteneur"
          description: "Le conteneur {{ $labels.name }} utilise {{ $value | printf \"%.2f\" }}% de sa mémoire."

      - alert: ContainerHighCPUUsage
        expr: rate(container_cpu_usage_seconds_total[5m]) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Utilisation CPU élevée du conteneur"
          description: "Le conteneur {{ $labels.name }} utilise {{ $value | printf \"%.2f\" }}% du CPU."

      # Alertes pour le système
      - alert: HostHighMemoryUsage
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Utilisation mémoire élevée sur l'hôte"
          description: "L'hôte {{ $labels.instance }} utilise {{ $value | printf \"%.2f\" }}% de sa mémoire."

      - alert: HostHighCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Utilisation CPU élevée sur l'hôte"
          description: "L'hôte {{ $labels.instance }} utilise {{ $value | printf \"%.2f\" }}% du CPU."

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) * 100 < 10
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Espace disque faible"
          description: "Le filesystem {{ $labels.mountpoint }} sur {{ $labels.instance }} n'a plus que {{ $value | printf \"%.2f\" }}% d'espace libre."

      # Alertes pour Piston
      - alert: PistonExecutionFailures
        expr: rate(piston_executions_failed_total[5m]) > 0.1
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Échecs d'exécution Piston"
          description: "Le taux d'échecs d'exécution de code est de {{ $value | humanizePercentage }}."

      - alert: PistonQueueLength
        expr: piston_queue_length > 10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "File d'attente Piston trop longue"
          description: "La file d'attente Piston contient {{ $value }} exécutions en attente."

      # Alertes pour la base de données
      - alert: DatabaseConnectionsHigh
        expr: db_connections_active / db_connections_max > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Nombre de connexions DB élevé"
          description: "{{ $value | printf \"%.2f\" }}% des connexions DB sont utilisées."

      # Alertes pour le monitoring
      - alert: PrometheusTargetDown
        expr: up == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Cible Prometheus down"
          description: "La cible {{ $labels.job }} ({{ $labels.instance }}) ne répond plus."

      - alert: PrometheusConfigurationReloadFailed
        expr: prometheus_config_last_reload_successful == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Rechargement configuration Prometheus échoué"
          description: "La configuration Prometheus n'a pas pu être rechargée."

      # Alertes de sécurité
      - alert: SuspiciousActivity
        expr: rate(security_violations_total[5m]) > 0.1
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Activité suspecte détectée"
          description: "Taux de violations de sécurité: {{ $value | humanizePercentage }}."

      - alert: BruteForceAttack
        expr: rate(failed_login_attempts_total[5m]) > 10
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Attaque par force brute suspectée"
          description: "{{ $value | printf \"%.0f\" }} tentatives de connexion échouées par minute."

  - name: capitaine-python-business-alerts
    rules:
      # Alertes métier
      - alert: CodeExecutionTooSlow
        expr: histogram_quantile(0.95, rate(code_execution_duration_seconds_bucket[5m])) > 30
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Exécution de code trop lente"
          description: "Le 95ème percentile des temps d'exécution est de {{ $value }}s."

      - alert: ExerciseSubmissionFailureRate
        expr: rate(exercise_submissions_failed_total[5m]) / rate(exercise_submissions_total[5m]) > 0.3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Taux d'échec de soumissions élevé"
          description: "{{ $value | humanizePercentage }} des soumissions d'exercices échouent."

      - alert: LowUserEngagement
        expr: rate(active_users_total[1h]) < 5
        for: 15m
        labels:
          severity: info
        annotations:
          summary: "Faible engagement utilisateur"
          description: "{{ $value | printf \"%.0f\" }} utilisateurs actifs par heure."