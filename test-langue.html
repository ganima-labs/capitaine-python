<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test de Localisation - Capitaine Python</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a1a;
            color: white;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .test-section {
            background: #2a2a2a;
            padding: 20px;
            margin: 20px 0;
            border-radius: 10px;
        }
        iframe {
            width: 100%;
            height: 600px;
            border: 1px solid #444;
            border-radius: 10px;
        }
        .result {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 5px;
            font-family: monospace;
            white-space: pre-wrap;
            margin: 10px 0;
        }
        .success { color: #4CAF50; }
        .error { color: #f44336; }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌍 Test de Localisation - Capitaine Python</h1>

        <div class="test-section">
            <h2>Test du changement de langue</h2>
            <button onclick="testLanguageChange()">Tester le changement de langue vers EN</button>
            <button onclick="testLanguageBack()">Revenir en FR</button>
            <div id="results" class="result"></div>
        </div>

        <div class="test-section">
            <h2>Application dans un iframe</h2>
            <iframe src="http://localhost:8080/" title="Capitaine Python"></iframe>
        </div>
    </div>

    <script>
        let testWindow = null;

        function log(message, type = 'info') {
            const results = document.getElementById('results');
            const timestamp = new Date().toLocaleTimeString();
            const className = type === 'error' ? 'error' : type === 'success' ? 'success' : '';
            results.innerHTML += `<span class="${className}">[${timestamp}] ${message}</span>\n`;
            results.scrollTop = results.scrollHeight;
        }

        async function testLanguageChange() {
            log('🌍 Test de changement de langue vers anglais...', 'info');

            try {
                // Obtenir une référence à l'iframe
                const iframe = document.querySelector('iframe');
                if (!iframe || !iframe.contentWindow) {
                    log('❌ Impossible d\'accéder à l\'iframe', 'error');
                    return;
                }

                testWindow = iframe.contentWindow;

                // Simuler le changement de langue
                log('🔍 Recherche du sélecteur de langue...', 'info');
                const languageSelector = testWindow.document.getElementById('language-selector');

                if (!languageSelector) {
                    log('❌ Sélecteur de langue non trouvé', 'error');
                    return;
                }

                log('✅ Sélecteur de langue trouvé', 'success');
                log(`📋 Langue actuelle: ${languageSelector.value}`, 'info');

                // Changer vers anglais
                log('🔄 Changement vers anglais...', 'info');
                languageSelector.value = 'en';

                // Déclencher l'événement change
                const changeEvent = new Event('change', { bubbles: true });
                languageSelector.dispatchEvent(changeEvent);

                // Attendre un peu
                await new Promise(resolve => setTimeout(resolve, 1000));

                // Vérifier les titres des cours
                const courseCards = testWindow.document.querySelectorAll('.course-card h3');
                if (courseCards.length > 0) {
                    log('📚 Vérification des titres de cours:', 'info');
                    courseCards.forEach((card, index) => {
                        log(`  Cours ${index + 1}: "${card.textContent.trim()}"`, 'success');
                    });
                }

                log('✅ Test de changement de langue terminé !', 'success');

            } catch (error) {
                log(`❌ Erreur: ${error.message}`, 'error');
            }
        }

        async function testLanguageBack() {
            log('🌍 Test de retour en français...', 'info');

            try {
                if (!testWindow) {
                    const iframe = document.querySelector('iframe');
                    testWindow = iframe.contentWindow;
                }

                const languageSelector = testWindow.document.getElementById('language-selector');
                if (!languageSelector) {
                    log('❌ Sélecteur de langue non trouvé', 'error');
                    return;
                }

                // Revenir en français
                log('🔄 Retour en français...', 'info');
                languageSelector.value = 'fr';

                const changeEvent = new Event('change', { bubbles: true });
                languageSelector.dispatchEvent(changeEvent);

                // Attendre un peu
                await new Promise(resolve => setTimeout(resolve, 1000));

                // Vérifier les titres des cours
                const courseCards = testWindow.document.querySelectorAll('.course-card h3');
                if (courseCards.length > 0) {
                    log('📚 Vérification des titres de cours:', 'info');
                    courseCards.forEach((card, index) => {
                        log(`  Cours ${index + 1}: "${card.textContent.trim()}"`, 'success');
                    });
                }

                log('✅ Test de retour en français terminé !', 'success');

            } catch (error) {
                log(`❌ Erreur: ${error.message}`, 'error');
            }
        }

        // Test automatique après chargement
        window.onload = function() {
            setTimeout(() => {
                log('🚀 Démarrage du test automatique...', 'info');
                testLanguageChange();
            }, 2000);
        };
    </script>
</body>
</html>
