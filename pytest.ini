[tool:pytest]
testpaths = app/backend
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --strict-config
    --disable-warnings
    --cov=app.backend
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=100
    --color=yes
    --durations=10
markers =
    unit: Tests unitaires
    integration: Tests d'intégration
    security: Tests de sécurité
    slow: Tests lents
    external: Tests nécessitant des ressources externes
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
asyncio_mode = auto