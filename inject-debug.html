<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Injection Debug</title>
</head>
<body>
    <h1>Test d'injection de script de diagnostic</h1>
    <button onclick="injectDebug()">Injecter le script de diagnostic</button>
    <button onclick="openSite()">Ouvrir Capitaine Python</button>

    <script>
        function injectDebug() {
            const iframe = document.createElement('iframe');
            iframe.src = 'http://localhost:8080';
            iframe.style.width = '100%';
            iframe.style.height = '600px';
            iframe.style.border = '1px solid #ccc';
            document.body.appendChild(iframe);

            iframe.onload = function() {
                console.log("🚀 Iframe chargé, injection du script...");

                // Lire le script de diagnostic
                fetch('/debug-i18n.js')
                    .then(response => response.text())
                    .then(scriptText => {
                        // Injecter le script dans l'iframe
                        const script = iframe.contentWindow.document.createElement('script');
                        script.textContent = scriptText;
                        iframe.contentWindow.document.head.appendChild(script);

                        console.log("✅ Script de diagnostic injecté");

                        // Attendre un peu puis lancer le diagnostic
                        setTimeout(() => {
                            try {
                                iframe.contentWindow.diagnostic();
                            } catch (error) {
                                console.error("❌ Erreur lors du diagnostic:", error);
                            }
                        }, 1000);
                    })
                    .catch(error => {
                        console.error("❌ Erreur lors du chargement du script:", error);
                    });
            };
        }

        function openSite() {
            window.open('http://localhost:8080', '_blank');
        }
    </script>
</body>
</html>
