<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Capitaine Python 🐍🚀 - Test</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-900 text-gray-100">
  <!-- Header -->
  <header class="bg-gradient-to-r from-blue-900 to-purple-900 shadow-2xl border-b border-gray-700">
    <div class="container mx-auto px-4 py-6">
      <div class="flex items-center justify-between">
        <h1 class="text-2xl md:text-3xl font-bold text-white flex items-center gap-3">
          <span class="text-3xl">👨‍✈️</span>
          <span>Capitaine Python</span>
          <span class="text-sm md:text-base text-blue-300">Test Simple</span>
        </h1>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="container mx-auto px-4 py-8">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

      <!-- Courses Section -->
      <section class="lg:col-span-1">
        <div class="bg-gray-800 rounded-xl shadow-xl p-6 border border-gray-700">
          <h2 class="text-xl font-bold text-white mb-6 flex items-center gap-2">
            <span>🎓</span>
            <span>Cours Disponibles</span>
          </h2>

          <div id="course-list" class="space-y-4">
            <!-- Course cards will be inserted here -->
            <p class="text-gray-400">Chargement des cours...</p>
          </div>

          <div id="exercises-container" class="mt-8 hidden">
            <h3 class="text-lg font-semibold text-white mb-4 flex items-center gap-2">
              <span>🎯</span>
              <span>Exercices</span>
            </h3>
            <div id="ex-list" class="space-y-2">
              <!-- Exercise links will be inserted here -->
            </div>
          </div>
        </div>
      </section>

      <!-- Exercise Section -->
      <section class="lg:col-span-2">
        <div class="bg-gray-800 rounded-xl shadow-xl p-6 border border-gray-700">
          <h2 class="text-xl font-bold text-white mb-6">Choisis un exercice</h2>
          <p class="text-gray-300">Sélectionne un cours puis un exercice pour commencer.</p>
        </div>
      </section>
    </div>
  </main>

  <script src="/static/app-simple.js"></script>
</body>
</html>
