<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a7c4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d5016;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="magicGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#90ee90;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00ff00;stop-opacity:0.3" />
    </linearGradient>
  </defs>

  <!-- Background circle with gradient -->
  <circle cx="32" cy="32" r="30" fill="url(#iconGradient)"/>

  <!-- Magic glow around sword -->
  <ellipse cx="32" cy="25" rx="18" ry="8" fill="url(#magicGlow)" opacity="0.7">
    <animate attributeName="rx" values="18;22;18" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.4;0.7" dur="2s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Hero sword -->
  <rect x="30" y="8" width="4" height="25" fill="#c0c0c0" rx="1"/>
  <rect x="28" y="6" width="8" height="4" fill="#ffd700" rx="1"/>
  <polygon points="32,10 36,12 34,14 32,13 30,14 28,12" fill="#ffd700"/>

  <!-- Sword handle/guard -->
  <rect x="26" y="32" width="12" height="3" fill="#8b4513" rx="1"/>
  <rect x="31" y="35" width="2" height="8" fill="#654321"/>
  <rect x="29" y="42" width="6" height="2" fill="#8b4513" rx="1"/>

  <!-- Forest leaves around sword -->
  <ellipse cx="20" cy="20" rx="8" ry="6" fill="#2d5016" opacity="0.7" transform="rotate(-30 20 20)"/>
  <ellipse cx="44" cy="18" rx="7" ry="5" fill="#4a7c4e" opacity="0.8" transform="rotate(25 44 18)"/>
  <ellipse cx="18" cy="35" rx="6" ry="4" fill="#2d5016" opacity="0.6" transform="rotate(-45 18 35)"/>
  <ellipse cx="46" cy="38" rx="7" ry="5" fill="#4a7c4e" opacity="0.7" transform="rotate(40 46 38)"/>

  <!-- Magic sparkles -->
  <circle cx="15" cy="10" r="1" fill="#ffd700">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="12" r="1" fill="#90ee90">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="12" cy="45" r="0.8" fill="#98fb98">
    <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="52" cy="48" r="1" fill="#adff2f">
    <animate attributeName="opacity" values="1;0.4;1" dur="1.7s" repeatCount="indefinite"/>
  </circle>
</svg>