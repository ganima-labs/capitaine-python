[tool:pytest]
minversion = 6.0
addopts = --cov=. --cov-report=term-missing --cov-report=html:htmlcov --cov-report=xml --cov-fail-under=100 --strict-markers --strict-config --tb=short -v

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    unit: Unit tests - fast, isolated tests
    integration: Integration tests - test component interactions
    security: Security tests - test security features and vulnerabilities
    slow: Slow tests - tests that take significant time
    api: API tests - test REST API endpoints
    db: Database tests - tests that interact with database

filterwarnings = error
    ignore::UserWarning
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning